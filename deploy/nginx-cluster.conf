# 知信聊天系统 - Nginx 集群负载均衡配置

upstream chat_backend {
    # 后端服务节点（添加更多节点只需修改这里）
    server 127.0.0.1:8080 weight=1 max_fails=3 fail_timeout=30s;
    # server 127.0.0.1:8081 weight=1 max_fails=3 fail_timeout=30s;  # 第二个节点
    # server 127.0.0.1:8082 weight=1 max_fails=3 fail_timeout=30s;  # 第三个节点
    keepalive 64;
}

upstream chat_websocket {
    ip_hash;  # WebSocket使用IP哈希确保同用户连接同一节点
    server 127.0.0.1:8080;
    # server 127.0.0.1:8081;
    # server 127.0.0.1:8082;
}

server {
    listen 80;
    server_name your-domain.com;  # 修改为你的域名
    
    # 重定向HTTP到HTTPS（生产环境建议开启）
    # return 301 https://$server_name$request_uri;

    client_max_body_size 100M;
    
    # API 请求
    location /api/ {
        proxy_pass http://chat_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket 连接
    location /ws {
        proxy_pass http://chat_websocket;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 必须设置
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # WebSocket 超时（根据需要调整）
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        
        # 关闭缓存
        proxy_buffering off;
    }

    # 静态资源
    location / {
        root /var/www/chat-system;
        try_files $uri $uri/ /index.html;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

