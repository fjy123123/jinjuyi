version: '3.8'

# =============================================
# Chat System Pro - 国产芯片专用配置
# 支持: 鲲鹏 (Kunpeng), 飞腾 (Phytium), 龙芯 (Loongson), 海光 (Hygon)
# =============================================

services:
  # MySQL - 关系数据库
  mysql:
    image: mysql:8.0
    container_name: chat-mysql-pro
    platform: ${PLATFORM:-linux/arm64}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-chatpro123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chat_system_pro}
      MYSQL_USER: ${MYSQL_USER:-chatuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-chatpro123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
    networks:
      - chat-pro-network
    restart: always
    command: 
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=512M
      - --max-connections=500
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  # MongoDB - 消息数据库
  mongodb:
    image: mongo:7
    container_name: chat-mongo-pro
    platform: ${PLATFORM:-linux/arm64}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/init:/docker-entrypoint-initdb.d:ro
    networks:
      - chat-pro-network
    restart: always
    command: --wiredTigerCacheSizeGB 2.0
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 1G

  # Redis - 缓存和消息队列
  redis:
    image: redis:7-alpine
    container_name: chat-redis-pro
    platform: ${PLATFORM:-linux/arm64}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/etc/redis/redis.conf:ro
    networks:
      - chat-pro-network
    restart: always
    command: redis-server /etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:-} --appendonly yes
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M

  # Backend - Go后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.china
      args:
        - PLATFORM=${PLATFORM:-linux/arm64}
    container_name: chat-backend-pro
    platform: ${PLATFORM:-linux/arm64}
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=${GIN_MODE:-release}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-chatuser}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-chatpro123}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-chat_system_pro}
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=chat_system_pro
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-changeme-in-production}
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_started
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - chat-pro-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend - 前端Web服务
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: chat-frontend-pro
    platform: ${PLATFORM:-linux/arm64}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
    networks:
      - chat-pro-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  chat-pro-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mysql_data:
    driver: local
  mongo_data:
    driver: local
  redis_data:
    driver: local
