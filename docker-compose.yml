version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: chat-mysql-pro
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_this_in_production!}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chat_system_pro}
      MYSQL_USER: ${MYSQL_USER:-chat_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_this_in_production!}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - chat-pro-network
    restart: always
    command: 
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  mongodb:
    image: mongo:7
    container_name: chat-mongo-pro
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mongo_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-change_this_in_production!}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-chat_system_pro}
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - chat-pro-network
    restart: always
    command: mongod --auth

  redis:
    image: redis:7-alpine
    container_name: chat-redis-pro
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chat-pro-network
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_this_in_production!} --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chat-backend-pro
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-chat_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_this_in_production!}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chat_system_pro}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER:-mongo_admin}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-change_this_in_production!}
      MONGO_DB: ${MONGO_DB:-chat_system_pro}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_this_in_production!}
      JWT_SECRET: ${JWT_SECRET:-please_generate_a_strong_random_key_here}
      GIN_MODE: ${GIN_MODE:-release}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      - mysql
      - mongodb
      - redis
    networks:
      - chat-pro-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: chat-frontend-pro
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - chat-pro-network
    restart: always

networks:
  chat-pro-network:
    driver: bridge

volumes:
  mysql_data:
  mongo_data:
  redis_data:
