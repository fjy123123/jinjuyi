version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: chat-mysql-pro
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-your_secure_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chat_system_pro}
      MYSQL_USER: ${MYSQL_USER:-chat_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-chat_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - chat-pro-network
    restart: always
    command: 
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  mongodb:
    image: mongo:7
    container_name: chat-mongo-pro
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - chat-pro-network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: chat-redis-pro
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chat-pro-network
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chat-backend-pro
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-chat_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-chat_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chat_system_pro}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB: chat_system_pro
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_key}
      GIN_MODE: ${GIN_MODE:-release}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      - mysql
      - mongodb
      - redis
    networks:
      - chat-pro-network
    restart: always
      resources:
        limits:
          cpus: '2
          memory: 4G

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: chat-frontend-pro
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
    networks:
      - chat-pro-network
    restart: always

networks:
  chat-pro-network:
    driver: bridge

volumes:
  mysql_data:
  mongo_data:
  redis_data:
