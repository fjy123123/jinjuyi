server:
  port: 8080
  mode: debug
  name: ChatSystemPro

database:
  host: localhost
  port: 3306
  user: root
  password: your_password_here
  dbname: chat_system_pro
  max_open_conns: 100
  max_idle_conns: 10

mongodb:
  host: localhost
  port: 27017
  user: 
  password: 
  dbname: chat_system_pro

redis:
  host: localhost
  port: 6379
  password: 
  db: 0

jwt:
  secret: your_super_secret_jwt_key_here_make_it_long_and_secure
  expire_hours: 720

upload:
  path: ./uploads
  max_size: 10485760

websocket:
  read_buffer_size: 4096
  write_buffer_size: 4096
  ping_interval: 30

payment:
  stripe_secret_key: sk_test_your_stripe_key_here
  wechat_pay_enabled: false
  wechat_mch_id: 
  wechat_apiv3_key: 
  wechat_cert_serial_no: 
  alipay_enabled: false
  alipay_app_id: 
  alipay_private_key: 
  alipay_public_key: 

security:
  invite_code_enabled: false
  captcha_enabled: false
  rate_limit_enabled: true

# 文件存储配置
storage:
  type: local  # local, oss, s3
  # OSS 配置
  oss:
    endpoint: 
    access_key: 
    secret_key: 
    bucket: 
    domain: 
  # S3 配置
  s3:
    region: us-east-1
    endpoint: 
    access_key: 
    secret_key: 
    bucket: 
    domain: 

# 推送服务配置
push:
  provider: jpush  # jpush, getui
  jpush:
    app_key: 
    app_secret: 
  getui:
    app_id: 
    app_key: 
    master_secret: 

# 微信小程序配置
miniprogram:
  wechat:
    app_id: 
    app_secret: 

system:
  ui_default: modern
